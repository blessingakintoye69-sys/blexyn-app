<!DOCTYPE html>
<html>
<head>
  <title>Blexyn App</title>
  <style>
    body { background: #121212; color: #fff; font-family: Arial; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .card { background:#1e1e1e; padding:30px; border-radius:15px; width:100%; max-width:400px; text-align:center; }
    input, select, button { width:90%; padding:12px; margin:10px 0; border-radius:8px; border:none; font-size:16px; }
    input, select { background:#2c2c2c; color:#fff; }
    button { background:#00c853; color:#fff; font-weight:bold; cursor:pointer; transition:.3s; }
    button:hover { background:#00e676; }
    .message { margin-top:15px; min-height:20px; font-weight:bold; }
    .link { color:#00e676; cursor:pointer; }
    .hidden { display:none; }
  </style>
</head>
<body>

<div class="card">
  <!-- Sign Up / Login -->
  <div id="auth">
    <h2 id="authTitle">Login</h2>
    <input type="text" id="name" placeholder="Full Name" class="hidden"/>
    <input type="email" id="email" placeholder="Email"/>
    <input type="text" id="phone" placeholder="Phone Number"/>
    <input type="password" id="password" placeholder="Password"/>
    <button id="authBtn">Login</button>
    <p class="message" id="authMessage"></p>
    <p id="toggleAuth" class="link">Don't have an account? Sign Up</p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <h2 id="welcome"></h2>
    <select id="type">
      <option value="">Select Type</option>
      <option value="airtime">Airtime</option>
      <option value="data">Data</option>
    </select>
    <select id="network">
      <option value="">Select Network</option>
      <option value="mtn">MTN</option>
      <option value="glo">GLO</option>
      <option value="airtel">Airtel</option>
      <option value="9mobile">9Mobile</option>
    </select>
    <input type="number" id="amount" placeholder="Enter Amount" class="hidden"/>
    <select id="plan" class="hidden"></select>
    <button id="buyBtn">Buy Now</button>
    <p class="message" id="buyMessage"></p>
    <button id="logoutBtn" style="margin-top:10px;">Logout</button>
  </div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
const authTitle = document.getElementById('authTitle');
const nameInput = document.getElementById('name');
const emailInput = document.getElementById('email');
const phoneInput = document.getElementById('phone');
const passwordInput = document.getElementById('password');
const authBtn = document.getElementById('authBtn');
const authMessage = document.getElementById('authMessage');
const toggleAuth = document.getElementById('toggleAuth');
const authDiv = document.getElementById('auth');
const dashboardDiv = document.getElementById('dashboard');
const welcome = document.getElementById('welcome');
const typeSelect = document.getElementById('type');
const networkSelect = document.getElementById('network');
const amountInput = document.getElementById('amount');
const planSelect = document.getElementById('plan');
const buyBtn = document.getElementById('buyBtn');
const buyMessage = document.getElementById('buyMessage');
const logoutBtn = document.getElementById('logoutBtn');

let isSignup = false;
let token = null;
let userName = "";

// Toggle Login / Sign Up
toggleAuth.addEventListener('click', () => {
  isSignup = !isSignup;
  nameInput.classList.toggle('hidden');
  authTitle.textContent = isSignup ? "Sign Up" : "Login";
  authBtn.textContent = isSignup ? "Sign Up" : "Login";
  toggleAuth.textContent = isSignup ? "Already have an account? Login" : "Don't have an account? Sign Up";
});

// Auth Button
authBtn.addEventListener('click', async () => {
  const name = nameInput.value;
  const email = emailInput.value;
  const phone = phoneInput.value;
  const password = passwordInput.value;
  if(!email || !phone || !password || (isSignup && !name)){
    authMessage.textContent = "Fill in all fields!";
    return;
  }

  const endpoint = isSignup ? '/api/signup' : '/api/login';
  const res = await fetch(endpoint, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name,email,phone,password})
  });
  const data = await res.json();
  authMessage.textContent = data.message;
  if(data.success){
    token = data.token;
    userName = data.name;
    dashboardDiv.classList.remove('hidden');
    authDiv.classList.add('hidden');
    welcome.textContent = `Hi ${userName}`;
  }
});

// Show Amount or Plan
typeSelect.addEventListener('change', () => {
  const type = typeSelect.value;
  if(type === "airtime"){
    amountInput.classList.remove('hidden');
    planSelect.classList.add('hidden');
  } else if(type === "data"){
    amountInput.classList.add('hidden');
    planSelect.classList.remove('hidden');
    planSelect.innerHTML = '<option value="">Select Data Plan</option>';
    ["500MB - ₦500","1GB - ₦1000","2GB - ₦2000"].forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.split('₦')[1];
      opt.textContent = p;
      planSelect.appendChild(opt);
    });
  } else {
    amountInput.classList.add('hidden');
    planSelect.classList.add('hidden');
  }
});

// Buy Button
buyBtn.addEventListener('click', async () => {
  const type = typeSelect.value;
  const network = networkSelect.value;
  const phone = phoneInput.value;
  let amount = type==="airtime" ? amountInput.value : planSelect.value;
  if(!type || !network || !phone || !amount){
    buyMessage.textContent = "Fill in all fields!";
    return;
  }
  if(type==="airtime" && (amount<50 || amount>10000)){
    buyMessage.textContent = "Airtime must be ₦50–₦10,000";
    return;
  }
  const amountKobo = amount*100;

  const handler = PaystackPop.setup({
    key: 'YOUR_PAYSTACK_PUBLIC_KEY', // replace with your key
    email: 'customer@example.com',
    amount: amountKobo,
    currency:"NGN",
    ref: ''+Math.floor(Math.random()*1000000000+1),
    onClose:function(){ buyMessage.textContent="Payment cancelled"; },
    callback: async function(response){
      buyMessage.textContent="Payment successful! Ref: "+response.reference;
      const res = await fetch('/api/buy',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body: JSON.stringify({type,network,phone,amount,paystackRef:response.reference})
      });
      const data = await res.json();
      buyMessage.textContent = data.success ? "Delivery successful!" : "Delivery failed: "+data.message;
    }
  });
  handler.openIframe();
});

// Logout
logoutBtn.addEventListener('click', ()=>{
  token=null;
  dashboardDiv.classList.add('hidden');
  authDiv.classList.remove('hidden');
  authMessage.textContent="";
});
</script>

</body>
</html>
