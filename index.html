<!DOCTYPE html>
<html>
<head>
  <title>Blexyn App - Full Local Test</title>
  <style>
    body { 
      background:#e6f0ff; 
      color:#0a0a0a; 
      font-family: Arial; 
      display:flex; 
      justify-content:center; 
      align-items:center; 
      min-height:100vh; 
      margin:0; 
    }
    .container { 
      width:100%; 
      max-width:450px; 
      padding:20px; 
    }
    .card { 
      background:#ffffff; 
      padding:30px; 
      border-radius:15px; 
      margin-bottom:20px; 
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }
    input, select, button { 
      width:100%; 
      padding:12px; 
      margin:10px 0; 
      border-radius:8px; 
      border:1px solid #a6c8ff; 
      font-size:16px; 
    }
    input, select { 
      background:#f0f8ff; 
      color:#0a0a0a; 
    }
    button { 
      background:#3399ff; 
      color:#fff; 
      font-weight:bold; 
      cursor:pointer; 
      transition:.3s; 
      border:none;
    }
    button:hover { 
      background:#66b3ff; 
    }
    .message { 
      min-height:20px; 
      font-weight:bold; 
      margin-top:5px; 
      color:#ff0000;
    }
    .link { 
      color:#3399ff; 
      cursor:pointer; 
      text-decoration:underline;
    }
    .hidden { display:none; }
    h2 { margin-top:0; color:#0052cc; }
    h3 { color:#0052cc; }
    ul { padding-left:20px; }
  </style>
</head>
<body>
<div class="container">

<!-- Welcome Screen -->
<div id="welcomeScreen" class="card">
  <h2>Welcome to Blexyn</h2>
  <p>Turn Your Data into Cash</p>
  <button id="btnCreateAccount">Create Account</button>
  <button id="btnLogin">Login</button>
</div>

<!-- Sign Up / Login -->
<div id="authScreen" class="card hidden">
  <h2 id="authTitle">Login</h2>
  <input type="text" id="name" placeholder="Full Name" class="hidden"/>
  <input type="email" id="email" placeholder="Email"/>
  <input type="text" id="phone" placeholder="Phone Number"/>
  <input type="password" id="password" placeholder="Password"/>
  <button id="authBtn">Login</button>
  <p class="message" id="authMessage"></p>
  <p id="toggleAuth" class="link">Don't have an account? Sign Up</p>
  <button id="backWelcome">Back</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="card hidden">
  <h2 id="welcomeUser"></h2>
  <p>Wallet: ₦<span id="walletBalance">0</span></p>
  <p>Data Balance: <span id="dataBalance">0</span> MB</p>
  
  <h3>Quick Actions</h3>
  <button id="btnSell">Sell Data / Airtime</button>
  <button id="btnWithdraw">Withdraw</button>
  <button id="btnHistory">Transaction History</button>
  <button id="btnProfile">Profile</button>
  <button id="btnLogout">Logout</button>
</div>

<!-- Sell Screen -->
<div id="sellScreen" class="card hidden">
  <h2>Sell</h2>
  <select id="sellType">
    <option value="">Select Type</option>
    <option value="airtime">Airtime</option>
    <option value="data">Data</option>
  </select>
  <select id="sellNetwork">
    <option value="">Select Network</option>
    <option value="mtn">MTN</option>
    <option value="glo">GLO</option>
    <option value="airtel">Airtel</option>
    <option value="9mobile">9Mobile</option>
  </select>
  <input type="number" id="sellAmount" placeholder="Enter Amount" class="hidden"/>
  <select id="sellPlan" class="hidden"></select>
  <input type="password" id="sellPin" placeholder="Enter Transaction PIN"/>
  <button id="buyBtn">Confirm Sale</button>
  <p class="message" id="buyMessage"></p>
  <button id="backDashboard1">Back</button>
</div>

<!-- Withdraw Screen -->
<div id="withdrawScreen" class="card hidden">
  <h2>Withdraw Funds</h2>
  <select id="withdrawMethod">
    <option value="">Select Method</option>
    <option value="bank">Bank Transfer</option>
    <option value="airtime">Airtime Purchase</option>
  </select>
  <input type="text" id="withdrawAccount" placeholder="Bank / Mobile Number"/>
  <input type="number" id="withdrawAmount" placeholder="Enter Amount"/>
  <input type="password" id="withdrawPin" placeholder="Enter Transaction PIN"/>
  <button id="withdrawBtn">Confirm Withdrawal</button>
  <p class="message" id="withdrawMessage"></p>
  <button id="backDashboard2">Back</button>
</div>

<!-- History Screen -->
<div id="historyScreen" class="card hidden">
  <h2>Transaction History</h2>
  <ul id="historyList"></ul>
  <button id="backDashboard3">Back</button>
</div>

<!-- Profile Screen -->
<div id="profileScreen" class="card hidden">
  <h2>Profile</h2>
  <p>Name: <span id="profileName"></span></p>
  <p>Email: <span id="profileEmail"></span></p>
  <p>Phone: <span id="profilePhone"></span></p>
  <input type="password" id="profilePin" placeholder="Change Transaction PIN"/>
  <button id="updatePin">Update PIN</button>
  <button id="backDashboard4">Back</button>
  <p class="message" id="profileMessage"></p>
</div>

</div>

<script>
function getUsers(){ return JSON.parse(localStorage.getItem('users')||'[]'); }
function saveUsers(users){ localStorage.setItem('users',JSON.stringify(users)); }
function getTransactions(){ return JSON.parse(localStorage.getItem('transactions')||'[]'); }
function saveTransactions(transactions){ localStorage.setItem('transactions',JSON.stringify(transactions)); }

let isSignup=false;
let currentUser=null;

document.getElementById('btnCreateAccount').onclick = ()=>{ showScreen('authScreen'); isSignup=true; toggleAuthView(); }
document.getElementById('btnLogin').onclick = ()=>{ showScreen('authScreen'); isSignup=false; toggleAuthView(); }
document.getElementById('backWelcome').onclick = ()=>{ showScreen('welcomeScreen'); }

function toggleAuthView(){
  document.getElementById('name').classList.toggle('hidden', !isSignup);
  document.getElementById('authTitle').textContent = isSignup ? "Sign Up" : "Login";
  document.getElementById('authBtn').textContent = isSignup ? "Sign Up" : "Login";
  document.getElementById('toggleAuth').textContent = isSignup ? "Already have an account? Login" : "Don't have an account? Sign Up";
}
document.getElementById('toggleAuth').onclick = ()=>{
  isSignup = !isSignup;
  toggleAuthView();
}
document.getElementById('authBtn').onclick = ()=>{
  const name=document.getElementById('name').value;
  const email=document.getElementById('email').value;
  const phone=document.getElementById('phone').value;
  const password=document.getElementById('password').value;
  const authMessage=document.getElementById('authMessage');
  if(!email||!phone||!password||(isSignup&&!name)){ authMessage.textContent="Fill in all fields!"; return; }
  let users=getUsers();
  if(isSignup){
    if(users.find(u=>u.email===email)){ authMessage.textContent="Email exists!"; return; }
    users.push({name,email,phone,password,wallet:0,dataBalance:0,pin:"1234"});
    saveUsers(users);
    authMessage.textContent="Sign Up successful! Login now.";
    isSignup=false; toggleAuthView();
  } else {
    const user=users.find(u=>u.email===email && u.password===password);
    if(!user){ authMessage.textContent="Invalid credentials!"; return; }
    currentUser=user;
    showDashboard();
  }
}

function showDashboard(){
  showScreen('dashboard');
  document.getElementById('welcomeUser').textContent=`Hi ${currentUser.name}`;
  document.getElementById('walletBalance').textContent=currentUser.wallet;
  document.getElementById('dataBalance').textContent=currentUser.dataBalance;
}

document.getElementById('btnSell').onclick = ()=>{ showScreen('sellScreen'); }
document.getElementById('backDashboard1').onclick = ()=>{ showDashboard(); }

const sellType=document.getElementById('sellType');
const sellPlan=document.getElementById('sellPlan');
const sellAmount=document.getElementById('sellAmount');
sellType.onchange = ()=>{
  const type=sellType.value;
  if(type==="airtime"){ sellAmount.classList.remove('hidden'); sellPlan.classList.add('hidden'); }
  else if(type==="data"){ sellAmount.classList.add('hidden'); sellPlan.classList.remove('hidden'); sellPlan.innerHTML='<option value="">Select Plan</option>';
    ["500MB - ₦500","1GB - ₦1000","2GB - ₦2000"].forEach(p=>{ const o=document.createElement('option'); o.value=p.split('₦')[1]; o.textContent=p; sellPlan.appendChild(o); });
  } else { sellAmount.classList.add('hidden'); sellPlan.classList.add('hidden'); }
}

document.getElementById('buyBtn').onclick = ()=>{
  const type=sellType.value;
  const network=document.getElementById('sellNetwork').value;
  const amount=type==="airtime"? sellAmount.value : sellPlan.value;
  const pin=document.getElementById('sellPin').value;
  const msg=document.getElementById('buyMessage');
  if(!type||!network||!amount||!pin){ msg.textContent="Fill in all fields!"; return; }
  if(pin!==currentUser.pin){ msg.textContent="Invalid PIN!"; return; }
  if(type==="airtime"&&(amount<50||amount>10000)){ msg.textContent="Airtime must be ₦50–₦10,000"; return; }
  if(type==="airtime") currentUser.wallet+=amount*0.9; else currentUser.wallet+=amount*0.9;
  if(type==="data") currentUser.dataBalance-=parseFloat(amount);
  saveUserUpdate();
  msg.textContent=`Sale confirmed! ₦${(amount*0.9).toFixed(2)} added to wallet`;
  sellAmount.value=""; sellPlan.value=""; document.getElementById('sellPin').value="";
}

document.getElementById('btnWithdraw').onclick = ()=>{ showScreen('withdrawScreen'); }
document.getElementById('backDashboard2').onclick = ()=>{ showDashboard(); }
document.getElementById('withdrawBtn').onclick = ()=>{
  const method=document.getElementById('withdrawMethod').value;
  const acc=document.getElementById('withdrawAccount').value;
  const amt=document.getElementById('withdrawAmount').value;
  const pin=document.getElementById('withdrawPin').value;
  const msg=document.getElementById('withdrawMessage');
  if(!method||!acc||!amt||!pin){ msg.textContent="Fill in all fields!"; return; }
  if(pin!==currentUser.pin){ msg.textContent="Invalid PIN!"; return; }
  if(amt>currentUser.wallet){ msg.textContent="Insufficient balance!"; return; }
  currentUser.wallet-=parseFloat(amt);
  saveUserUpdate();
  msg.textContent=`Withdrawal of ₦${amt} via ${method} simulated`;
  document.getElementById('withdrawAmount').value=""; document.getElementById('withdrawPin').value="";
}

document.getElementById('btnHistory').onclick = ()=>{
  showScreen('historyScreen');
  const list=document.getElementById('historyList');
  list.innerHTML="";
  const tx=getTransactions().filter(t=>t.email===currentUser.email);
  if(tx.length===0){ list.innerHTML="<li>No transactions yet</li>"; return; }
  tx.forEach(t=>{ const li=document.createElement('li'); li.textContent=`${t.date}: ${t.type} ₦${t.amount}`; list.appendChild(li); });
}
document.getElementById('backDashboard3').onclick = ()=>{ showDashboard(); }

document.getElementById('btnProfile').onclick = ()=>{
  showScreen('profileScreen');
  document.getElementById('profileName').textContent=currentUser.name;
  document.getElementById('profileEmail').textContent=currentUser.email;
  document.getElementById('profilePhone').textContent=currentUser.phone;
}
document.getElementById('updatePin').onclick = ()=>{
  const pin=document.getElementById('profilePin').value;
  if(!pin){ document.getElementById('profileMessage').textContent="Enter new PIN"; return; }
  currentUser.pin=pin; saveUserUpdate();
  document.getElementById('profileMessage').textContent="PIN updated!";
  document.getElementById('profilePin').value="";
}
document.getElementById('backDashboard4').onclick = ()=>{ showDashboard(); }

document.getElementById('btnLogout').onclick = ()=>{
  currentUser=null;
  showScreen('welcomeScreen');
}

function showScreen(id){
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('sellScreen').classList.add('hidden');
  document.getElementById('withdrawScreen').classList.add('hidden');
  document.getElementById('historyScreen').classList.add('hidden');
  document.getElementById('profileScreen').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}
function saveUserUpdate(){
  let users=getUsers();
  users=users.map(u=>u.email===currentUser.email?currentUser:u);
  saveUsers(users);
}
</script>
</body>
    </html>
