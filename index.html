<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blexyn App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

.container{
  max-width:400px;
  margin:40px auto;
  padding:20px;
}

input, select{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:20px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  background:#007bff;
  color:white;
  margin-top:10px;
}

.screen{display:none;}
.active{display:block;}

.card{
  background:#1a1a1a;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111;
  padding:10px;
}

.whatsapp-btn{
  position:fixed;
  right:20px;
  bottom:80px;
  background:#25D366;
  padding:12px;
  border-radius:50px;
  text-decoration:none;
  color:white;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div class="container screen active" id="welcome">
  <h2>Welcome</h2>
  <button onclick="show('register')">Create Account</button>
  <button onclick="show('login')">Login</button>
</div>

<!-- REGISTER -->
<div class="container screen" id="register">
  <h2>Register</h2>

  <input placeholder="Phone Number (080...)" id="phone">
  <button onclick="sendOTP()">Send OTP</button>

  <input placeholder="Enter OTP" id="otp">
  <button onclick="verifyOTP()">Verify</button>

  <input placeholder="Full Name">
  <input placeholder="Email">
  <input type="date">

  <select>
    <option>Lagos</option>
    <option>Abuja</option>
    <option>Kano</option>
  </select>

  <input placeholder="BVN or NIN">

  <input placeholder="Create Password" type="password">
  <input placeholder="4-digit PIN" type="password">

  <button onclick="completeRegister()">Create Account</button>
</div>

<!-- LOGIN -->
<div class="container screen" id="login">
  <h2>Login</h2>
  <input placeholder="Phone Number">
  <input placeholder="PIN" type="password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container screen" id="dashboard">
  <h2>Dashboard</h2>

  <div class="card">
    Wallet Balance: ₦0.00
  </div>

  <div class="card">
    Data Balance: 0GB
  </div>

  <button onclick="show('sell')">Sell Data</button>
  <button onclick="show('withdraw')">Withdraw</button>
  <button onclick="show('history')">History</button>
</div>

<!-- SELL DATA -->
<div class="container screen" id="sell">
  <h2>Sell Data</h2>

  <select>
    <option>MTN</option>
    <option>Airtel</option>
    <option>Glo</option>
    <option>9mobile</option>
  </select>

  <input placeholder="Amount (GB)">
  <button onclick="sellData()">Sell</button>
</div>

<!-- WITHDRAW -->
<div class="container screen" id="withdraw">
  <h2>Withdraw</h2>

  <select>
    <option>Bank Transfer</option>
    <option>OPay</option>
    <option>PalmPay</option>
  </select>

  <input placeholder="Account Number">
  <input placeholder="Amount">

  <button onclick="withdraw()">Withdraw</button>
</div>

<!-- HISTORY -->
<div class="container screen" id="history">
  <h2>Transaction History</h2>

  <div class="card">No transactions yet</div>
</div>

<!-- PROFILE -->
<div class="container screen" id="profile">
  <h2>Profile</h2>

  <button onclick="logout()">Logout</button>
</div>

<!-- NAV -->
<div class="nav">
  <span onclick="show('dashboard')">Home</span>
  <span onclick="show('sell')">Sell</span>
  <span onclick="show('history')">History</span>
  <span onclick="show('profile')">Profile</span>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/2348123456789?text=Hello%20I%20need%20help" target="_blank" class="whatsapp-btn">
Chat
</a>

<script>
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function sendOTP(){
  alert("OTP sent (demo)");
}

function verifyOTP(){
  alert("OTP verified");
}

function completeRegister(){
  alert("Account created!");
  show('login');
}

function login(){
  show('dashboard');
}

function sellData(){
  alert("Data sold! ₦315 added");
}

function withdraw(){
  alert("Withdrawal successful");
}

function logout(){
  show('welcome');
}
</script>

</body>
</html>
