<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blexyn App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* Background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') center/cover;
  filter: blur(10px) brightness(0.4);
  z-index: -1;
}

/* Container */
.container {
  max-width: 400px;
  margin: 80px auto;
  padding: 20px;
}

/* Title */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* Inputs */
.input-box {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border-radius: 25px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 16px;
}

/* Button */
.btn {
  width: 100%;
  padding: 15px;
  border-radius: 25px;
  border: none;
  background: #007bff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* WhatsApp Floating Button */
.whatsapp-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  border-radius: 50px;
  padding: 12px 15px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}

/* Dashboard */
.dashboard {
  display: none;
}

/* Card */
.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- LOGIN -->
<div class="container" id="loginPage">
  <h2>Welcome Back</h2>

  <input type="email" id="email" placeholder="Enter your email" class="input-box">
  <input type="password" id="password" placeholder="Enter your password" class="input-box">

  <button class="btn" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container dashboard" id="dashboard">
  <h2>Blexyn Dashboard</h2>

  <div class="card">
    <h3>Balance</h3>
    <p>₦0.00</p>
  </div>

  <div class="card">
    <h3>Buy Data</h3>
    <button class="btn">Proceed</button>
  </div>
</div>

<!-- WhatsApp Button -->
<div class="whatsapp-btn">
  <img src="https://img.icons8.com/ios-filled/20/ffffff/whatsapp.png">
  WhatsApp Bot
</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(email && password){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    alert("Enter your details");
  }
}
</script>

</body>
</html>
