<style>
body { 
  background: linear-gradient(to bottom, #e6f0ff, #ffffff);
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial;
  display:flex; 
  justify-content:center; 
  align-items:center; 
  min-height:100vh; 
  margin:0; 
}

/* iPhone Frame */
.container { 
  width: 350px; 
  height: 700px; 
  background: #ffffff; 
  border-radius: 40px; 
  padding: 20px; 
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  overflow-y: auto;
}

/* Glass Card */
.card { 
  background: rgba(255,255,255,0.35); 
  backdrop-filter: blur(20px); 
  padding: 25px; 
  border-radius: 25px; 
  margin-bottom: 20px; 
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.3);
  animation: fadeIn 0.4s ease;
}

/* Inputs */
input, select { 
  width:100%; 
  padding:14px; 
  margin:10px 0; 
  border-radius:15px; 
  border:none; 
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  font-size:16px;
  outline:none;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
}

/* Buttons */
button { 
  width:100%; 
  padding:14px; 
  margin-top:10px; 
  border-radius:20px; 
  border:none;
  background: linear-gradient(135deg, #3399ff, #007bff);
  color:#fff; 
  font-weight:bold; 
  cursor:pointer; 
  transition:.3s; 
  box-shadow: 0 5px 15px rgba(0,123,255,0.3);
}

button:hover { 
  transform: scale(1.05);
}

/* Text */
h2 { 
  margin-top:0; 
  color:#007bff; 
  font-weight:600;
}

h3 { 
  color:#007bff; 
}

p { 
  color:#444;
}

/* Links */
.link { 
  color:#007bff; 
  cursor:pointer; 
  text-decoration:none;
  font-weight:500;
}

.link:hover {
  text-decoration: underline;
}

/* Message */
.message { 
  min-height:20px; 
  font-weight:bold; 
  margin-top:5px; 
  color:#ff3b30;
}

/* Hidden */
.hidden { display:none; }

/* Smooth animation */
@keyframes fadeIn {
  from { opacity:0; transform: translateY(10px); }
  to { opacity:1; transform: translateY(0); }
}

/* Scrollbar (clean iOS feel) */
.container::-webkit-scrollbar {
  width: 5px;
}
.container::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 10px;
}
</style>
